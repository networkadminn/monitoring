name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'ENDSSH'
            cd /home/euclideesolution/monitoring.euclideesolutions.com
            echo "🔄 Pulling latest changes..."
            git pull origin main
            echo "📦 Setting permissions..."
            chmod 644 config.php
            chmod 755 index.php cron_runner.php
            echo "🗄️ Running database updates..."
            php install.php
            echo "✅ Deployment complete!"
          ENDSSH
      
      - name: Verify Deployment
        run: |
          echo "🔍 Checking site status..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://monitoring.euclideesolutions.com/
