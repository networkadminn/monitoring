name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/euclideesolution/monitoring.euclideesolutions.com
            echo "🔄 Pulling latest changes..."
            git pull origin main
            echo "🗄️ Running database updates..."
            php install.php
            echo "🔧 Setting permissions..."
            chmod 644 config.php
            chmod 755 index.php cron_runner.php
            echo "✅ Deployment completed at $(date)"
      
      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://monitoring.euclideesolutions.com/
