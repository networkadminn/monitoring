name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy with SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 30m
          debug: true
          script: |
            cd /home/euclideesolution/monitoring.euclideesolutions.com
            echo "🔄 Fetching latest changes..."
            git fetch origin main
            
            echo "🧹 Cleaning up local modifications..."
            # Force server to match repository exactly (production best practice)
            git reset --hard origin/main
            
            echo "🗄️ Running database updates..."
            # This ensures any new tables/columns (like 'tags') are created
            php install.php
            
            echo "🔧 Setting permissions..."
            chmod 644 config.php
            chmod 755 index.php cron_runner.php
            
            echo "✅ Deployment completed at $(date)"
      
      - name: Verify Deployment
        run: |
          echo "🔍 Verifying deployment..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://monitoring.euclideesolutions.com/
